name: Chris Studio macOS Builds and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v2.3.0-alpha.4
        required: true
        default: v2.3.0-alpha.4
        type: string
      create_release:
        description: Create or update the GitHub Release
        required: true
        default: true
        type: boolean
      make_latest:
        description: Mark this release as latest
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: chris-studio-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'
  CARGO_TERM_COLOR: always

jobs:
  verify-desktop-ui:
    name: Verify desktop UI and privacy boundary
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json

      - name: Verify public npm lockfile registries
        run: node scripts/verify-public-npm-locks.cjs

      - name: Install desktop UI dependencies
        run: npm ci --prefix apps/desktop/ui --legacy-peer-deps --no-audit --no-fund

      - name: Verify desktop dependency resolution
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/desktop/ui ls @tauri-apps/api exceljs pdfjs-dist mammoth tesseract.js --depth=0
          test -f apps/desktop/ui/node_modules/@tauri-apps/api/package.json
          test -f apps/desktop/ui/node_modules/exceljs/package.json
          test -f apps/desktop/ui/node_modules/pdfjs-dist/package.json

      - name: Show effective desktop TypeScript configuration
        run: |
          node - <<'NODE'
          const config = require('./apps/desktop/ui/tsconfig.json');
          console.log(JSON.stringify(config, null, 2));
          const entries = Array.isArray(config.include)
            ? config.include
            : Array.isArray(config.files)
              ? config.files
              : [];
          if (!entries.includes('src/main.tsx') || entries.includes('src')) {
            console.error('Desktop typecheck must start from src/main.tsx only.');
            process.exit(1);
          }
          NODE

      - name: Type-check production desktop dependency graph
        run: npm --prefix apps/desktop/ui run typecheck

      - name: Run core privacy and token tests
        run: npm --prefix apps/desktop/ui run test:core

      - name: Build desktop UI
        run: npm --prefix apps/desktop/ui run build

  build-macos:
    name: macOS ${{ matrix.label }}
    needs: verify-desktop-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: Apple Silicon
            slug: Apple-Silicon
            arch: arm64
          - runner: macos-15-intel
            label: Intel
            slug: Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Verify public npm lockfile registries
        run: node scripts/verify-public-npm-locks.cjs

      - name: Install desktop UI dependencies
        run: npm ci --prefix apps/desktop/ui --legacy-peer-deps --no-audit --no-fund

      - name: Verify desktop dependency resolution
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/desktop/ui ls @tauri-apps/api exceljs pdfjs-dist mammoth tesseract.js --depth=0
          test -f apps/desktop/ui/node_modules/@tauri-apps/api/package.json
          test -f apps/desktop/ui/node_modules/exceljs/package.json
          test -f apps/desktop/ui/node_modules/pdfjs-dist/package.json

      - name: Install Tauri CLI
        run: npm install --global @tauri-apps/cli@1.6.3 --no-audit --no-fund

      - name: Verify desktop TypeScript before native build
        run: npm --prefix apps/desktop/ui run typecheck

      - name: Verify native dialog build configuration
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, pathlib, tomllib
          root = pathlib.Path('.')
          cargo = tomllib.loads((root / 'apps/desktop/src-tauri/Cargo.toml').read_text())
          features = cargo['dependencies']['tauri'].get('features', [])
          if 'dialog' not in features or 'dialog-open' not in features:
              raise SystemExit(f'Tauri dialog features are incomplete: {features}')
          conf = json.loads((root / 'apps/desktop/src-tauri/tauri.conf.json').read_text())
          dialog = conf.get('tauri', {}).get('allowlist', {}).get('dialog', {})
          if not dialog.get('open'):
              raise SystemExit('tauri.allowlist.dialog.open must be true')
          print('Native dialog configuration is valid.')
          PY

      - name: Check native Rust backend
        run: cargo check --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Test transactional project boundaries
        run: cargo test --locked --manifest-path apps/desktop/src-tauri/Cargo.toml project_change_tests -- --nocapture

      - name: Import Apple Developer ID certificate when configured
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo 'No Apple Developer ID certificate configured; a community build will be produced.'
            exit 0
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/chris-studio-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/chris-studio-signing.keychain-db"
          CERTIFICATE_PATH="$CERTIFICATE_PATH" python3 - <<'PY'
          import base64, os
          from pathlib import Path
          Path(os.environ['CERTIFICATE_PATH']).write_bytes(base64.b64decode(os.environ['APPLE_CERTIFICATE']))
          PY
          security create-keychain -p chris-studio-ci "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p chris-studio-ci "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k chris-studio-ci "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' 'NR==1 { print $2 }')"
          if [[ -z "$IDENTITY" ]]; then
            echo 'No signing identity was found in APPLE_CERTIFICATE.'
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "CHRIS_STUDIO_SIGNED_BUILD=true" >> "$GITHUB_ENV"
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            echo "CHRIS_STUDIO_NOTARIZATION_CONFIGURED=true" >> "$GITHUB_ENV"
          else
            echo "CHRIS_STUDIO_NOTARIZATION_CONFIGURED=false" >> "$GITHUB_ENV"
            echo "Developer ID signing is configured, but Apple notarization credentials are incomplete."
          fi

      - name: Build Tauri application
        env:
          RUST_BACKTRACE: '1'
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            echo "Building with Apple Developer ID signing identity."
            export APPLE_ID="${APPLE_ID_SECRET:-}"
            export APPLE_PASSWORD="${APPLE_PASSWORD_SECRET:-}"
            export APPLE_TEAM_ID="${APPLE_TEAM_ID_SECRET:-}"
          else
            echo "No Apple signing identity configured; building the community bundle without Tauri signing."
            unset APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID || true
          fi
          tauri build --bundles app --ci

      - name: Package DMG and APP ZIP
        env:
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/package-macos-release.sh "${{ matrix.slug }}" "${{ matrix.arch }}"

      - name: Upload ${{ matrix.label }} packages
        uses: actions/upload-artifact@v4
        with:
          name: Chris-Studio-macOS-${{ matrix.slug }}
          path: release/${{ matrix.slug }}/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Create or update GitHub Release
    needs: build-macos
    if: ${{ inputs.create_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Chris-Studio-macOS-*
          path: release
          merge-multiple: true

      - name: List release files
        run: find release -maxdepth 2 -type f -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Chris Studio ${{ inputs.version }}
          body: |
            ## Chris Studio ${{ inputs.version }}

            This release contains the version committed in the repository. Alpha tags remain pre-releases and never replace the latest stable release. The workflow produces architecture-verified Developer ID signed/notarized packages when Apple secrets are configured; otherwise it publishes ad-hoc signed community packages with an APP ZIP fallback.

            ### Installation
            1. Download the package matching your Mac processor.
            2. Open the DMG and move Chris Studio to Applications.
            3. If macOS reports the unsigned app as damaged, run:
               `sudo xattr -rd com.apple.quarantine "/Applications/Chris Studio.app"`

            API credentials are user supplied and stored per provider profile through the operating-system credential store. Computer Use remains a permission-gated Beta; unrestricted pointer, keyboard and shell control are not enabled in this release.
          files: release/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          make_latest: ${{ !contains(inputs.version, '-') && inputs.make_latest }}
